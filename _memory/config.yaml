# GAIA Agent Memory Configuration
# Source of truth for token budgets, cross-agent access, and archival thresholds.
# Reference: architecture.md Section 10.10, ADR-014, ADR-015

tiers:
  tier_1:
    label: "Rich"
    files: 3  # ground-truth.md, decision-log.md, conversation-context.md
    session_budget: 300000  # tokens (own + cross-refs)
    has_ground_truth: true
    agents: [validator, architect, pm, sm]
  tier_2:
    label: "Standard"
    files: 2  # decision-log.md, conversation-context.md
    session_budget: 100000
    has_ground_truth: false
    agents: [orchestrator, security, devops, test-architect]
  tier_3:
    label: "Simple"
    files: 1  # decision-log.md
    session_budget: null  # no budget enforcement
    has_ground_truth: false
    agents: [typescript-dev, angular-dev, flutter-dev, java-dev, python-dev, mobile-dev, storyteller, tech-writer, qa]

# Per-agent ground truth budgets (Tier 1 only)
agents:
  validator:
    ground_truth_budget: 200000
    sidecar: validator-sidecar
  architect:
    ground_truth_budget: 150000
    sidecar: architect-sidecar
  pm:
    ground_truth_budget: 100000
    sidecar: pm-sidecar
  sm:
    ground_truth_budget: 100000
    sidecar: sm-sidecar
  orchestrator:
    sidecar: orchestrator-sidecar
  security:
    sidecar: security-sidecar
  devops:
    sidecar: devops-sidecar
  test-architect:
    sidecar: test-architect-sidecar
  storyteller:
    sidecar: storyteller-sidecar
  tech-writer:
    sidecar: tech-writer-sidecar
  angular-dev:
    sidecar: angular-dev-sidecar
  typescript-dev:
    sidecar: typescript-dev-sidecar
  flutter-dev:
    sidecar: flutter-dev-sidecar
  java-dev:
    sidecar: java-dev-sidecar
  python-dev:
    sidecar: python-dev-sidecar
  mobile-dev:
    sidecar: mobile-dev-sidecar
  qa:
    sidecar: qa-sidecar

# Cross-agent read access matrix (ADR-015)
# All cross-references are read-only, loaded JIT
# Modes: recent (last 2 sprints), full (entire file), summary (headers only)
cross_references:
  architect:
    reads_from:
      - agent: pm
        file: decision-log
        mode: recent
      - agent: validator
        file: ground-truth
        mode: recent
  pm:
    reads_from:
      - agent: architect
        file: decision-log
        mode: recent
      - agent: sm
        file: ground-truth
        mode: recent
  sm:
    reads_from:
      - agent: architect
        file: decision-log
        mode: recent
      - agent: pm
        file: decision-log
        mode: recent
      - agent: validator
        file: ground-truth
        mode: recent
  orchestrator:
    reads_from:
      - agent: validator
        file: conversation-context
        mode: summary
      - agent: architect
        file: conversation-context
        mode: summary
      - agent: pm
        file: conversation-context
        mode: summary
      - agent: sm
        file: conversation-context
        mode: summary
  security:
    reads_from:
      - agent: architect
        file: decision-log
        mode: recent
      - agent: validator
        file: ground-truth
        mode: recent
  devops:
    reads_from:
      - agent: architect
        file: decision-log
        mode: recent
  test-architect:
    reads_from:
      - agent: architect
        file: decision-log
        mode: recent
      - agent: validator
        file: ground-truth
        mode: recent
  validator:
    reads_from:
      - agent: architect
        file: decision-log
        mode: full
      - agent: pm
        file: decision-log
        mode: full
      - agent: sm
        file: decision-log
        mode: full
    cross_ref_budget_cap: 0.5  # cross-refs max 50% of session budget
  dev-agents:
    reads_from:
      - agent: validator
        file: ground-truth
        mode: recent
      - agent: architect
        file: decision-log
        mode: recent

# Archival thresholds
archival:
  budget_warn_at: 0.8   # warn at 80% of token budget
  budget_alert_at: 0.9  # alert at 90%
  budget_archive_at: 1.0  # archive oldest entries at 100%
  token_approximation: 4  # chars per token (rough estimate)
  archive_subdir: "archive"  # gitignored subdirectory per sidecar
