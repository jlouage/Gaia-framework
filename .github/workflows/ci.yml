# CI Pipeline — runs on PRs and pushes to main
# Job topology: lint → test → package (sequential), security (parallel)
# E4-S1: Base pipeline structure (lint, test, security, package)
# E4-S4: Supply chain gates (audit hard/soft, dep budget, lock-file detection)
# See docs/planning-artifacts/architecture.md Section 10.4

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: ShellCheck
        if: runner.os != 'Windows'
        run: |
          sudo apt-get install -y shellcheck
          find . -name "*.sh" -not -path "./node_modules/*" -exec shellcheck {} +

  test:
    name: Test (${{ matrix.os }})
    needs: [lint]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest
        run: npm test

      - name: Setup BATS
        if: runner.os != 'Windows'
        run: bash test/shell/setup-bats.sh

      - name: Run BATS shell tests
        if: runner.os != 'Windows'
        run: npm run test:shell

      - name: Windows validation
        if: runner.os == 'Windows'
        run: bash test/shell/windows-validate.sh

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check lock-file-only changes
        if: github.event_name == 'pull_request'
        run: |
          # Detect PRs that modify package-lock.json without a corresponding package.json change
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD 2>/dev/null || echo "")
          if echo "$CHANGED_FILES" | grep -q "^package-lock.json$"; then
            if ! echo "$CHANGED_FILES" | grep -q "^package.json$"; then
              echo "::warning::package-lock.json changed without a package.json change — verify this is intentional"
            fi
          fi

      - name: Audit production dependencies (hard gate)
        timeout-minutes: 5
        run: npm audit --omit=dev

      - name: Audit dev dependencies (soft gate)
        continue-on-error: true
        run: |
          OUTPUT=$(npm audit --json 2>/dev/null || true)
          echo "$OUTPUT" | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8');
            try {
              const report = JSON.parse(data);
              const vulns = report.vulnerabilities || {};
              let hasCritical = false;
              for (const [name, info] of Object.entries(vulns)) {
                if (info.severity === 'critical') {
                  hasCritical = true;
                  console.log('CRITICAL vulnerability: ' + name + ' — ' + (info.via?.[0]?.title || 'no details'));
                }
              }
              if (hasCritical) {
                console.log('::warning::CRITICAL dev dependency vulnerabilities detected — see audit output above');
              }
              // Log summary
              const meta = report.metadata || {};
              const total = meta.vulnerabilities || {};
              console.log('Audit summary: ' + JSON.stringify(total));
            } catch (e) {
              console.log('Could not parse audit JSON — raw output logged above');
              console.log(data.substring(0, 500));
            }
          "

      - name: Dependency budget check (soft gate)
        continue-on-error: true
        run: bash scripts/check-dep-budget.sh

  package:
    name: Package Validation
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard against .npmignore
        run: |
          if [ -f ".npmignore" ]; then
            echo "::error::Remove .npmignore — use package.json files field as the canonical whitelist. .npmignore silently overrides the files field."
            exit 1
          fi
          echo ".npmignore guard passed — no .npmignore file found"

      - name: Verify package contents
        run: |
          echo "=== npm pack dry run ==="
          PACK_OUTPUT=$(npm pack --dry-run 2>&1)
          echo "$PACK_OUTPUT"

          VIOLATIONS=""

          # Full exclusion matrix per architecture Section 10.6 and E4-S3 story
          EXCLUDED_PATTERNS="test/ .github/ .eslintrc .prettierrc .editorconfig .husky/ docs/"

          for PATTERN in $EXCLUDED_PATTERNS; do
            if echo "$PACK_OUTPUT" | grep -q "$PATTERN"; then
              echo "::error::Package includes $PATTERN — should be excluded by files whitelist"
              VIOLATIONS="${VIOLATIONS}  - $PATTERN\n"
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "::error::Package content verification FAILED — unexpected files detected:"
            echo -e "$VIOLATIONS"
            echo "Fix: ensure package.json 'files' field only includes production files."
            exit 1
          fi

          FILE_COUNT=$(echo "$PACK_OUTPUT" | grep -c "│" || true)
          echo "Package contents verified — $FILE_COUNT files match whitelist, no excluded patterns found"

      - name: Check transitive dependency count
        run: |
          DEP_COUNT=$(npm ls --all --json 2>/dev/null | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8');
            const tree = JSON.parse(data);
            function countDeps(obj) {
              let count = 0;
              if (obj.dependencies) {
                for (const [name, dep] of Object.entries(obj.dependencies)) {
                  count += 1 + countDeps(dep);
                }
              }
              return count;
            }
            console.log(countDeps(tree));
          ")
          echo "Transitive dependency count: $DEP_COUNT"
          if [ "$DEP_COUNT" -gt 400 ]; then
            echo "::warning::Transitive dependency count ($DEP_COUNT) exceeds budget of 400"
          fi
