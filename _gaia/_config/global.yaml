# GAIA Framework — Global Configuration
# Single source of truth for all shared settings.
# After modifying this file, run /gaia-build-configs to regenerate resolved configs.

framework_name: "GAIA"
framework_version: "1.122.6-rc.1"

# User settings
user_name: "jlouage"
communication_language: "English"
document_output_language: "English"
user_skill_level: "intermediate"  # beginner | intermediate | expert

# Project settings
project_name: "GAIA-Framework"
project_root: "{project-root}"
# Project path — relative directory within the root where application source code lives.
# Use "." (default) if the project code lives at the root alongside _gaia/.
# Use a folder name (e.g., "app", "project", "my-app") if the code lives in a subdirectory.
# The resolved {project-path} variable expands to the full absolute path.
project_path: "Gaia-framework"

# Val integration — feature gates for inline validation
val_integration:
  template_output_review: true   # Show [v] Review with Val at template-output prompts
  val_validate_output: true      # Enable automatic Val validation when workflow declares val_validate_output: true

# Output paths
output_folder: "{project-root}/docs"
planning_artifacts: "{project-root}/docs/planning-artifacts"
implementation_artifacts: "{project-root}/docs/implementation-artifacts"
test_artifacts: "{project-root}/docs/test-artifacts"
creative_artifacts: "{project-root}/docs/creative-artifacts"

# Story sizing — canonical T-shirt-to-points mapping (Fibonacci scale)
sizing_map:
  S: 2
  M: 5
  L: 8
  XL: 13

# Problem-solving workflow — context gathering configuration
problem_solving:
  context_budget: 30000  # Max tokens for auto-gathered context (Step 0)

# Framework paths
installed_path: "{project-root}/_gaia"
config_path: "{project-root}/_gaia/_config"
memory_path: "{project-root}/_memory"
checkpoint_path: "{project-root}/_memory/checkpoints"

# Test Execution Bridge (ADR-028, FR-202, NFR-035)
# Opt-in subsystem that runs tests during the post-review phase of applicable workflows.
# When bridge_enabled is false (the default), ALL bridge layers are completely bypassed
# with zero behavior change — no log messages, no file reads. This is the safety toggle
# for the entire bridge subsystem. Existing installations are unaffected by default.
test_execution_bridge:
  # Master switch. false = bridge completely inactive (default, opt-in semantics).
  # Set to true to activate the bridge in applicable workflows.
  bridge_enabled: false
  # Maximum wall-clock seconds the bridge will wait for a test run before aborting.
  # Only consulted when bridge_enabled is true.
  timeout_seconds: 300
