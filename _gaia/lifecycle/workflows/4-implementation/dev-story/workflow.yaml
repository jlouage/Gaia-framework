name: dev-story
description: 'Execute story implementation following story spec'
module: lifecycle
agent: dev-*
execution_mode: planning
val_auto_in_yolo: true
val_auto_in_yolo_steps: [5, 6, 7, 8]
agent_auto_detect: true
agent_auto_detect_strategy: |
  1. Read story file frontmatter for tech_stack or stack field â€” map to agent (typescriptâ†’typescript-dev, angularâ†’angular-dev, flutterâ†’flutter-dev, javaâ†’java-dev, pythonâ†’python-dev, mobileâ†’mobile-dev)
  2. If absent: read {planning_artifacts}/architecture.md for primary language/framework
  3. If ambiguous: check file extensions in story subtasks (.ts/.tsxâ†’typescript, .dartâ†’flutter, .javaâ†’java, .pyâ†’python, .swift/.ktâ†’mobile, .component.tsâ†’angular)
  4. Fallback: ask user which developer to use
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/dev-story.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/4-implementation/dev-story"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
required_skills:
  - "{project-root}/_gaia/dev/skills/git-workflow.md"
  - "{project-root}/_gaia/dev/skills/testing-patterns.md"
required_skill_sections:
  - "git-workflow:commits"
  - "git-workflow:pull-requests"
  - "testing-patterns:tdd-cycle"
quality_gates:
  pre_start:
    - check: "story_file_exists({implementation_artifacts}/{story_key}-*.md)"
      on_fail: "HALT: Story file not found. Expected {implementation_artifacts}/{story_key}-*.md. Run /gaia-create-story first."
    - check: "story_status == 'ready-for-dev'"
      on_fail: "HALT: Story must be in ready-for-dev status. Run /gaia-validate-story first to validate the story."
  post_complete:
    - check: "all_tests_pass == true"
      on_fail: "HALT: All tests must pass before marking complete."
input_file_patterns:
  story:
    whole: "{implementation_artifacts}/{{story_key}}-*.md"
    load_strategy: "FULL_LOAD"
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "INDEX_GUIDED"
  ux_design:
    whole: "{planning_artifacts}/ux-design.md"
    load_strategy: "INDEX_GUIDED"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"
story_statuses: [backlog, validating, ready-for-dev, in-progress, blocked, review, done]

output:
  primary: "{implementation_artifacts}/{story_key}-*.md"
