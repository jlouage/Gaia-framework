name: val-refresh-ground-truth
description: 'Rescan filesystem and update verified facts in ground-truth.md'
module: lifecycle
agent: validator
execution_mode: normal
config_resolved: "{installed_path}/.resolved/val-refresh-ground-truth.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/4-implementation/val-refresh-ground-truth"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
parameters:
  agent:
    flag: "--agent"
    description: "Which Tier 1 agent's ground truth to refresh. Defaults to val for backward compatibility."
    default: "val"
    allowed_values: [val, theo, derek, nate, all]
  incremental:
    flag: "--incremental"
    description: "Only scan files modified since last refresh timestamp. Full refresh is default."
    default: false
required_skill_sections:
  - "ground-truth-management:full-refresh"
  - "ground-truth-management:incremental-refresh"
  - "ground-truth-management:entry-structure"
  - "ground-truth-management:dual-refresh"
  - "ground-truth-management:conflict-resolution"
  - "ground-truth-management:token-budget"
  - "memory-management:empty-seed-invariant"
input_file_patterns:
  ground_truth:
    whole: "{memory_path}/validator-sidecar/ground-truth.md"
    load_strategy: "FULL_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{memory_path}/validator-sidecar/ground-truth.md"
  committed_seed: "{project-path}/_memory/validator-sidecar/ground-truth.md"
