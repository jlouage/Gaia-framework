name: tech-debt-review
description: 'Aggregate, classify, and prioritize technical debt'
module: lifecycle
agent: sm
template_output_prompt: "[e] Edit dashboard before saving (or press Enter to continue — recommendations follow automatically)"
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/tech-debt-review.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/4-implementation/tech-debt-review"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
template: "{project-root}/_gaia/lifecycle/templates/tech-debt-dashboard-template.md"
input_file_patterns:
  status:
    whole: "{implementation_artifacts}/sprint-status.yaml"
    load_strategy: "FULL_LOAD"
  stories:
    pattern: "{implementation_artifacts}/*.md"
    load_strategy: "FRONTMATTER_ONLY"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/tech-debt-dashboard.md"
