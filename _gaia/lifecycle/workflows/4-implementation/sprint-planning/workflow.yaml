name: sprint-planning
description: 'Generate sprint plan from epics and stories'
module: lifecycle
agent: sm
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/sprint-planning.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/4-implementation/sprint-planning"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  epics:
    whole: "{planning_artifacts}/epics-and-stories.md"
    load_strategy: "FULL_LOAD"
tracking_system: "file-system"
status_file: "{implementation_artifacts}/sprint-status.yaml"
story_statuses: [backlog, validating, ready-for-dev, in-progress, blocked, review, done]
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/sprint-{sprint_id}-plan.md"
