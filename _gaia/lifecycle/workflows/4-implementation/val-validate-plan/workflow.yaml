name: val-validate-plan
description: 'Validate implementation plan before execution — catches incorrect file targets, inconsistent version bumps, and missing scope'
module: lifecycle
agent: validator
model_override: opus
execution_mode: normal
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/val-validate-plan.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/4-implementation/val-validate-plan"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
required_skill_sections:
  - "validation-patterns:claim-extraction"
  - "validation-patterns:filesystem-verification"
  - "validation-patterns:severity-classification"
  - "validation-patterns:findings-formatting"
input_file_patterns:
  plan:
    whole: "{plan_artifact_path}"
    load_strategy: "FULL_LOAD"
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "INDEX_GUIDED"
  global_config:
    whole: "{project-root}/_gaia/_config/global.yaml"
    load_strategy: "FULL_LOAD"
quality_gates:
  pre_start:
    - check: "plan_artifact_path is provided"
      on_fail: "HALT: No plan artifact path specified. Usage: /gaia-val-validate-plan <path-to-plan>"
  post_complete:
    - check: "findings_written or clean_plan_confirmed"
      on_fail: "HALT: Validation must complete with either written findings or explicit clean-plan confirmation. Re-run /gaia-val-validate-plan to complete validation."
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{plan_artifact_path}"
